# v0.4.0 方案 C: 公交-轨道-步行混合协同
scenario_id: C_hybrid_cooperative
scenario_name: "方案C: 混合协同"
description: "近步行/中公交直达/远轨道接驳, 站点过载分流"

mode: hybrid
rail_enabled: true
bus_enabled: true
walk_enabled: true

event:
  type: "crowd"
  center: [117.205, 34.268]
  radius_m: 1500

demand:
  file: "data/processed/demand_points_v0.1.geojson"

bus:
  num_buses: 30
  capacity_per_bus: 50

rail:
  stations_file: "data/processed/rail_stations_v0.4.geojson"
  lines_file: "data/processed/rail_lines_v0.4.csv"
  time_window_h: 1.0

cooperative:
  max_walk_s: 1800
  max_bus_s: 3600
  alpha: 1.0
  beta: 1.2
  gamma: 10.0
  delta: 5.0

simulation:
  engine: "sumo"
  duration_s: 7200
